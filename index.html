<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기능사 자격증 고속 퀴즈</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 480px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* 입력창 디자인: 배경색과 테두리를 더 명확하게 */
        input { 
            width: 88%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: #fff; /* 배경을 흰색으로 확실히 */
        }
        input:focus { border-color: #007bff; outline: none; }

        /* 중복확인 레이아웃 수정 */
        .input-group { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 95%; 
            margin: 10px auto; 
            gap: 10px; 
        }
        .input-group input { width: 65%; margin: 0; }
        .input-group button { 
            width: 30%; 
            margin: 0; 
            padding: 14px 5px; 
            font-size: 13px; 
            background: #6c757d; 
            white-space: nowrap; 
        }
        
        button { width: 95%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 8px 0; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; transform: translateY(-2px); }
        
        .rank-view-btn { background: #ffc107; color: #212529; }
        .sub-btn { background: #6c757d; font-size: 14px; }
        .option-btn { background: #f8f9fa; color: #333; border: 1px solid #ddd; text-align: left; margin: 8px 0; }
        .rank-item { display: flex; align-items: center; padding: 12px; margin: 8px 0; border-radius: 10px; background: #fff; border: 1px solid #eee; }
        .rank-1 { background: linear-gradient(45deg, #fff9e6, #ffdf80); border: 2px solid #ffd700; transform: scale(1.05); }
        .medal { font-size: 24px; margin-right: 15px; width: 35px; text-align: center; }
        .rank-info { flex-grow: 1; text-align: left; }
        img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- 1. 로그인 섹션 -->
    <div id="login-box" class="card">
        <h1 style="color:#007bff; margin-bottom:30px;">CATCH CERTIFICATION</h1>
        <input type="text" id="l-id" placeholder="아이디"><br>
        <input type="password" id="l-pw" placeholder="비밀번호"><br>
        <button id="login-btn" onclick="login()">로그인</button>
        <button class="rank-view-btn" onclick="showRankOnly()">🏆 명예의 전당 (랭킹 보기)</button>
        <p onclick="toggleView(true)" style="color:#007bff; cursor:pointer; font-size:14px; margin-top:15px;">처음이신가요? 회원가입</p>
    </div>

<!-- 2. 회원가입 섹션 -->
<div id="reg-box" class="card hidden">
    <h2 style="margin-bottom: 20px;">회원가입</h2>
    
    <!-- 아이디 입력 -->
    <div class="input-group">
        <input type="text" id="r-id" placeholder="사용할 아이디 입력" oninput="resetIdCheck()">
        <button onclick="checkDuplicateId()">중복확인</button>
    </div>
    
    <!-- 비밀번호 입력 -->
    <input type="password" id="r-pw" placeholder="비밀번호 입력 (문자/숫자)">
    
    <!-- 이름 입력 -->
    <input type="text" id="r-name" placeholder="이름 (한글 3~5자)">
    
    <!-- 학번 입력 -->
    <input type="text" id="r-sid" placeholder="학번 (1~3으로 시작하는 5자리)">
    
    <!-- 생년월일 입력 -->
    <input type="text" id="r-birth" placeholder="생년월일 (숫자 6자리, 예: 050101)">
    
    <button onclick="register()" style="margin-top: 20px; background: #007bff;">가입완료</button>
    <p onclick="toggleView(false)" style="color:#007bff; cursor:pointer; font-size:14px; margin-top: 15px;">로그인으로 돌아가기</p>
</div>

    <!-- (이후 과목선택, 퀴즈, 랭킹 섹션은 이전과 동일) -->
    <div id="subject-box" class="card hidden">
        <h2>과목을 선택하세요</h2>
        <button class="sub-btn" onclick="loadSubject('drawing.json', '기계제도')">전산응용기계제도기능사</button>
        <button class="sub-btn" onclick="loadSubject('lathe.json', '선반')">컴퓨터응용선반기능사</button>
        <button class="sub-btn" onclick="loadSubject('milling.json', '밀링')">컴퓨터응용밀링기능사</button>
        <button class="sub-btn" onclick="loadSubject('assembly.json', '기계조립')">기계조립기능사</button>
        <button class="sub-btn" onclick="loadSubject('maintenance.json', '설비보전')">설비보전기능사</button>
        <button class="sub-btn" onclick="loadSubject('automation.json', '자동화설비')">자동화설비기능사</button>
        <button class="sub-btn" onclick="loadSubject('3dprint.json', '3D프린터')">3D프린터운용기능사</button>
        <button class="sub-btn" onclick="loadSubject('welding.json', '용접')">피복아크용접기능사</button>
    </div>
    <div id="quiz-box" class="card hidden">
        <h3 id="q-txt"></h3><div id="q-img"></div><div id="q-opts"></div>
        <p>현재 점수: <span id="cur-score" style="color:red; font-weight:bold;">0</span></p>
    </div>
    <div id="rank-box" class="card hidden">
        <h2 style="color:#ffc107;">🏆 TOP 10 랭킹</h2>
        <div id="rank-list"></div>
        <button onclick="location.reload()" style="margin-top:20px;">메인 화면으로</button>
    </div>

    <script>
        // Firebase 설정 (사용자님 정보 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyBw4aKlyf8JGEXLTpvIXBScr1XOFJ2eAzU",
            authDomain: "catchcertification-1d63d.firebaseapp.com",
            projectId: "catchcertification-1d63d",
            storageBucket: "catchcertification-1d63d.firebasestorage.app",
            messagingSenderId: "309107718029",
            appId: "1:309107718029:web:f6addcc6b46cc52e33efc4",
            measurementId: "G-W0P90QVS37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = null, problems = [], currentIdx = 0, score = 0, selectedSubject = "";
        let isIdChecked = false; // 중복 확인 여부
        let lastCheckedId = ""; // 마지막으로 확인 완료된 아이디

        function toggleView(isReg) {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        }

        // 아이디 입력창에 타이핑하면 중복 확인 상태 리셋
        function resetIdCheck() {
            isIdChecked = false;
        }

        // 중복 확인 함수
        async function checkDuplicateId() {
            const id = document.getElementById('r-id').value.trim();
            if (!id) return alert("아이디를 입력해주세요.");

            db.ref('users/' + id).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    alert("이미 사용 중인 아이디입니다. 다시 작성해주세요.");
                    isIdChecked = false;
                } else {
                    alert("사용 가능한 아이디입니다.");
                    isIdChecked = true;
                    lastCheckedId = id;
                }
            });
        }

        // 회원가입 최종 실행
        async function register() {
            const id = document.getElementById('r-id').value.trim();
            const pw = document.getElementById('r-pw').value.trim();
            const name = document.getElementById('r-name').value.trim();
            const sid = document.getElementById('r-sid').value.trim();
            const birth = document.getElementById('r-birth').value.trim();

            // 1. 중복 확인 여부 체크
            if (!isIdChecked || id !== lastCheckedId) {
                alert("아이디 중복 확인을 먼저 해주세요. 다시 작성해주세요.");
                return;
            }

            // 2. 이름 검사: 한글 3~5자
            if (!/^[가-힣]{3,5}$/.test(name)) {
                alert("이름은 한글로 3~5글자여야 합니다. 다시 작성해주세요.");
                return;
            }

            // 3. 학번 검사
            if (!/^[1-3][0-9]{2}(0[1-9]|1[0-9]|20)$/.test(sid)) {
                alert("학번은 1~3으로 시작하는 5자리 숫자여야 하며, 마지막 두 자리는 01~20이어야 합니다. 다시 작성해주세요.");
                return;
            }

            // 4. 생년월일 검사
            if (!/^\d{6}$/.test(birth)) {
                alert("생년월일은 숫자 6자리로 작성되어야 합니다. 다시 작성해주세요.");
                return;
            }

            if (!pw) {
                alert("비밀번호를 입력해주세요. 다시 작성해주세요.");
                return;
            }

            // 최종 저장
            db.ref('users/' + id).set({
                id: id, pw: pw, name: name, student_id: sid, birth: birth, score: 0
            }).then(() => {
                alert("회원가입이 완료되었습니다!");
                location.reload();
            });
        }

        // (login, loadSubject, showQuiz, fetchRanking 등 함수는 이전과 동일)
        async function login() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            const btn = document.getElementById('login-btn');
            if(!id || !pw) return alert("아이디와 비번을 입력하세요.");
            btn.innerText = "로그인 중..."; btn.disabled = true;
            db.ref('users/' + id).once('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData && userData.pw === pw) {
                    user = userData;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('subject-box').classList.remove('hidden');
                } else { alert("아이디 또는 비밀번호가 틀립니다."); }
                btn.innerText = "로그인"; btn.disabled = false;
            });
        }
        function loadSubject(f, s) {
            selectedSubject = s;
            fetch(f).then(r => r.json()).then(d => {
                problems = d; currentIdx = 0; score = 0;
                document.getElementById('subject-box').classList.add('hidden');
                document.getElementById('quiz-box').classList.remove('hidden');
                showQuiz();
            }).catch(e => alert("파일을 찾을 수 없습니다."));
        }
        function showQuiz() {
            if (currentIdx >= problems.length) return finish();
            const p = problems[currentIdx];
            document.getElementById('q-txt').innerText = (currentIdx+1) + ". " + p.question;
            document.getElementById('q-img').innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";
            const optDiv = document.getElementById('q-opts'); optDiv.innerHTML = "";
            p.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn"; btn.innerText = (i+1) + ") " + o;
                btn.onclick = () => { if (i+1 === p.answer) score += 10; document.getElementById('cur-score').innerText = score; currentIdx++; showQuiz(); };
                optDiv.appendChild(btn);
            });
        }
        function showRankOnly() { document.getElementById('login-box').classList.add('hidden'); document.getElementById('rank-box').classList.remove('hidden'); fetchRanking(); }
        async function finish() {
            document.getElementById('quiz-box').classList.add('hidden'); document.getElementById('rank-box').classList.remove('hidden');
            if (score > (user.score || 0)) { await db.ref('users/' + user.id).update({ score: score }); }
            fetchRanking();
        }
        function fetchRanking() {
            const list = document.getElementById('rank-list');
            list.innerHTML = "<p>로딩 중...</p>";
            db.ref('users').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
                const users = []; snapshot.forEach((child) => { users.push(child.val()); }); users.reverse();
                list.innerHTML = users.map((u, i) => {
                    let rc = ""; let m = i + 1;
                    if (i === 0) { rc = "rank-1"; m = "🥇"; }
                    else if (i === 1) { rc = "rank-2"; m = "🥈"; }
                    else if (i === 2) { rc = "rank-3"; m = "🥉"; }
                    return `<div class="rank-item ${rc}"><div class="medal">${m}</div><div class="rank-info"><div style="font-size:17px;font-weight:bold;">${u.name}</div><div style="font-size:14px;color:#dc3545;">${u.score}점</div></div></div>`;
                }).join('');
            });
        }
    </script>
</body>
</html>
