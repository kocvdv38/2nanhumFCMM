<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATCH CERT - School & Game Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
/* 1. 모든 요소의 크기 계산을 테두리 포함으로 고정 */
        * { box-sizing: border-box; }

        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        
        /* 2. 카드의 패딩을 고정 (여백 관리의 기준) */
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }

        /* 3. 일반 입력창/선택창 설정: 너비 100% */
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; /* 위아래 간격 */
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            display: block;
        }
    
    /* 4. 중복확인 버튼과 아이디 입력창을 감싸는 그룹 */
    .input-group { 
        display: flex; 
        width: 100%; 
        gap: 8px; /* 칸 사이 간격 */
        margin: 8px 0; 
    }
    .input-group input { 
        flex: 1; /* 아이디창이 남은 공간을 다 채움 */
        margin: 0; 
    }
    .input-group button { 
        width: 100px; /* 버튼 가로폭 고정 */
        margin: 0; 
        padding: 0 10px;
        font-size: 13px;
        flex-shrink: 0; /* 버튼이 찌그러지지 않게 설정 */
    }

    /* 5. 버튼 공통 스타일 */
button { 
        width: 100%;       /* 기본적으로는 가로폭 100% */
        padding: 14px; 
        border: none; 
        border-radius: 8px; /* ★ 모서리를 부드럽게 깎아주는 코드 */
        cursor: pointer; 
        font-weight: bold; 
        margin: 8px 0; 
        font-size: 16px; 
        color: white; 
        transition: 0.2s; 
    }

    /* 로그인: 아이디·비밀번호 사이 간격만 촘촘하게 (<br> 제거와 맞춤) */
    #login-box > input {
        margin: 0 0 8px 0;
    }
    #login-box > input:last-of-type {
        margin-bottom: 14px;
    }

    /* 로그인 상자 안의 두 버튼만 나란히 배치 */
    #login-box button {
        width: 46%;        /* 두 버튼이 들어갈 수 있게 폭 조절 */
        display: inline-block;
        margin: 10px 1%;   /* 버튼 사이 간격 */
    }

    .login-footer {
        margin-top: 22px;
        padding-top: 14px;
        border-top: 1px solid #eee;
        font-size: 11px;
        line-height: 1.5;
        color: #888;
    }
    .login-footer a {
        color: #666;
        text-decoration: none;
    }
    .login-footer a:hover {
        text-decoration: underline;
    }

    #profile-box .profile-field-label {
        display: block;
        text-align: left;
        font-size: 13px;
        color: #666;
        margin: 12px 0 4px 0;
    }
    #profile-box .profile-field-label--first {
        margin-top: 0;
    }
    #profile-box #p-name[readonly] {
        background: #f5f6f7;
        cursor: default;
        color: #444;
    }

    .sid-format-hint {
        font-size: 12px;
        color: #777;
        text-align: left;
        margin: 4px 0 10px 0;
        line-height: 1.45;
    }
    #reg-box .reg-pw-notice {
        margin-bottom: 12px;
    }

    /* 모드 선택: 제목 가운데 + 오른쪽 개인정보 아이콘 */
    .mode-header {
        display: grid;
        grid-template-columns: 44px 1fr 44px;
        align-items: center;
        margin-bottom: 6px;
    }
    .mode-title {
        grid-column: 2;
        margin: 0;
        font-size: 1.5em;
        text-align: center;
    }
    .btn-profile-icon {
        grid-column: 3;
        justify-self: end;
        width: 44px !important;
        height: 44px;
        padding: 0 !important;
        margin: 0 !important;
        border-radius: 50%;
        background: #f1f3f5 !important;
        color: #495057 !important;
        border: 1px solid #dee2e6 !important;
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .btn-profile-icon:hover {
        background: #e9ecef !important;
        color: #007bff !important;
        border-color: #007bff !important;
    }
    .btn-profile-icon svg {
        width: 22px;
        height: 22px;
        display: block;
    }

    .btn-rank-icon {
        grid-column: 1;
        justify-self: start;
        width: 44px !important;
        height: 44px;
        padding: 0 !important;
        margin: 0 !important;
        border-radius: 50%;
        background: #f1f3f5 !important;
        color: #495057 !important;
        border: 1px solid #dee2e6 !important;
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .btn-rank-icon:hover {
        background: #e9ecef !important;
        color: #fd7e14 !important;
        border-color: #fd7e14 !important;
    }
    .btn-rank-icon svg {
        width: 22px;
        height: 22px;
        display: block;
    }
    
    .btn-blue { background: #007bff; } 
    .btn-green { background: #28a745; }
    .btn-red { background: #dc3545; } 
    .btn-orange { background: #fd7e14; }
    .btn-purple { background: #6f42c1; } 
    .btn-gray { background: #6c757d; }
    
    button:hover { 
        opacity: 0.9; 
        transform: translateY(-1px); 
    }

    /* 게임 UI */
    #game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
    .timer-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin-bottom: 10px; overflow: hidden; border: 1px solid #ddd; }
    #timer-fill { width: 100%; height: 100%; background: #28a745; transition: width 0.1s linear; }
    
    /* 아이템 UI */
    .item-zone { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed #ccc; }
    .item-container { display: flex; justify-content: space-around; gap: 5px; }
    .item-btn { 
        width: 32% !important; /* 아이템 버튼은 100%가 아니므로 !important 추가 */
        font-size: 11px; background: #6f42c1; padding: 10px 2px; position: relative; 
    }
    .item-btn:disabled { background: #ccc; filter: grayscale(1); cursor: not-allowed; }
    .item-count { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

    .option-btn { background: #f8f9fa; color: #333 !important; border: 1px solid #ddd; text-align: left; }
    .correct { background: #d4edda !important; border-color: #28a745 !important; }
    .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
    
    /* 랭킹 탭 */
    .rank-tabs { display: flex; justify-content: space-around; margin-bottom: 15px; }
    .rank-tab { 
        width: auto !important; /* 탭 버튼도 100% 무시 */
        font-size: 11px; padding: 10px 2px; cursor: pointer; background: #eee; border-radius: 5px; flex: 1; margin: 0 2px; border: 1px solid #ddd; color: #333;
    }
    .active-tab { background: #007bff !important; color: white !important; border-color: #0056b3; }
    
    img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    .rank-item { display: flex; align-items: center; padding: 12px; margin: 8px 0; border-radius: 10px; background: #fff; border: 1px solid #eee; font-size: 14px; }
    .rank-item.rank-item--admin { align-items: flex-start; }
    .rank-admin-label { flex-shrink: 0; margin: 0 6px 0 0; padding-top: 2px; cursor: pointer; }
    .rank-admin-cb { width: 17px; height: 17px; cursor: pointer; vertical-align: middle; }
    .rank-admin-actions { margin: 12px 0; text-align: left; }
    .rank-admin-actions label { cursor: pointer; user-select: none; }
    .rank-1 { background: #fff9e6; border: 1px solid #ffd700; box-shadow: 0 2px 5px rgba(255,215,0,0.2); }
    .rank-school { font-size: 11px; color: #666; margin-top: 2px; }
    .rank-info { flex: 1; text-align: left; }
    .rank-my-box {
        background: #e7f1ff;
        border: 1px solid #b8d4f0;
        border-radius: 10px;
        padding: 12px 14px;
        text-align: left;
        font-size: 14px;
        color: #333;
    }
    .rank-my-box strong { color: #007bff; }

    /* 로그인 화면: 모드별 TOP3 미리보기 */
    .login-top3-wrap {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #eee;
        text-align: left;
        font-size: 11px;
        color: #444;
        line-height: 1.35;
    }
    .login-top3-block { margin-bottom: 10px; }
    .login-top3-block:last-child { margin-bottom: 0; }
    .login-top3-title {
        font-weight: bold;
        font-size: 11px;
        color: #007bff;
        margin-bottom: 3px;
    }
    .login-top3-line {
        padding: 1px 0 1px 2px;
        word-break: break-all;
    }
    .login-top3-rank {
        display: inline-block;
        width: 16px;
        color: #999;
        flex-shrink: 0;
    }
    .login-top3-muted { color: #aaa; padding: 0 3px; }
    .login-top3-loading, .login-top3-err, .login-top3-empty {
        font-size: 11px;
        color: #888;
        text-align: center;
        padding: 4px 0;
    }
    </style>
</head>
<body>

    <!-- 1. 로그인 섹션 -->
    <div id="login-box" class="card">
        <h1 style="color:#007bff; margin-bottom:30px;">CATCH CERT</h1>
        <input type="text" id="l-id" placeholder="아이디">
        <input type="password" id="l-pw" placeholder="비밀번호">
        <button class="btn-blue" onclick="login()">로그인</button>
        <button class="btn-orange" onclick="openRank()">🏆 랭킹 보기</button>
        <p onclick="toggleView(true)" style="color:#007bff; cursor:pointer; margin-top:15px;">처음이신가요? 회원가입</p>
        <div id="login-top3-preview" class="login-top3-wrap" aria-live="polite">
            <p class="login-top3-loading">순위 불러오는 중...</p>
        </div>
        <footer class="login-footer">
            문의 및 요청: <a href="mailto:zx48xz@naver.com">zx48xz@naver.com</a><br>
            © 2026. 주용호 All rights reserved.
        </footer>
    </div>

    <!-- 2. 회원가입 섹션 -->
    <div id="reg-box" class="card hidden">
        <h2>회원가입</h2>
        <div class="input-group">
            <input type="text" id="r-id" placeholder="아이디" oninput="resetIdCheck()">
            <button type="button" class="btn-gray" onclick="checkDuplicateId()">중복확인</button>
        </div>
        <input type="password" id="r-pw" placeholder="비밀번호" autocomplete="new-password">
        <p class="sid-format-hint reg-pw-notice">평소에 사용하지 않는 비밀번호로 설정하세요(관리자 확인 가능)</p>
        
        <!-- 학교 선택 추가 -->
        <select id="r-school">
            <option value="">학교 선택</option>
            <option value="군산기계공업고등학교">군산기계공업고등학교</option>
            <option value="수소에너지고등학교">수소에너지고등학교</option>
            <option value="이리공업고등학교">이리공업고등학교</option>
            <option value="전북기계공업고등학교">전북기계공업고등학교</option>
            <option value="전북자동차고등학교">전북자동차고등학교</option>
            <option value="전주공업고등학교">전주공업고등학교</option>
        </select>

        <input type="text" id="r-name" placeholder="이름 (한글 3~5자)" oninput="resetIdentityCheck()">
        <input type="text" id="r-sid" placeholder="학번 (5자리)">
        <p class="sid-format-hint">예시) 2학년 7반 1번 -&gt; 20701</p>
        <input type="text" id="r-birth" placeholder="생년월일 (숫자 6자리)" oninput="resetIdentityCheck()">
        <button type="button" class="btn-gray" onclick="checkDuplicateIdentity()">이름·생년월일 중복확인</button>
        <button type="button" class="btn-blue" onclick="register()">가입완료</button>
        <p onclick="toggleView(false)" style="color:#007bff; cursor:pointer;">로그인으로 돌아가기</p>
    </div>

    <!-- 3. 모드 선택 -->
    <div id="mode-box" class="card hidden">
        <div class="mode-header">
            <button type="button" class="btn-rank-icon" onclick="openRankFromMode()" aria-label="랭킹 보기" title="랭킹 보기">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                    <path d="M4 22h16"/>
                    <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                    <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                    <path d="M18 2H6v7c0 2.21 1.79 4 4 4h0c2.21 0 4-1.79 4-4V2z"/>
                </svg>
            </button>
            <h2 class="mode-title">모드 선택</h2>
            <button type="button" class="btn-profile-icon" onclick="openProfile()" aria-label="개인정보 변경" title="개인정보 변경">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </button>
        </div>
        <p id="mode-user-line" style="font-size:14px;color:#555;margin:0 0 12px 0;"></p>
        <button class="btn-green" onclick="selectMode('practice')">📖 연습하기 (공부량 랭킹)</button>
        <button class="btn-purple" onclick="selectMode('classic')">🏆 클래식 도전 (전체 풀이)</button>
        <button class="btn-red" onclick="selectMode('survival')">💔 서바이벌 (목숨 3개)</button>
        <button class="btn-orange" onclick="selectMode('timeattack')">⏱️ 타임 어택 (아이템전)</button>
    </div>

    <!-- 3-1. 개인정보 변경 -->
    <div id="profile-box" class="card hidden">
        <h2>개인정보 변경</h2>
        <p style="text-align:left;font-size:14px;color:#666;margin:0 0 12px 0;">아이디: <strong id="p-id-display"></strong></p>
        <label for="p-name" class="profile-field-label profile-field-label--first">이름 <span style="font-weight:normal;color:#999;">(변경 불가)</span></label>
        <div class="input-group profile-name-row">
            <input type="text" id="p-name" placeholder="이름 (한글 3~5자)" maxlength="5" autocomplete="name" readonly tabindex="-1">
            <button type="button" class="btn-gray" id="p-name-hide-btn" onclick="toggleRankingNameHide()" title="랭킹에서 이름 숨기기">숨기기</button>
        </div>
        <label for="p-pw" class="profile-field-label">비밀번호</label>
        <input type="password" id="p-pw" placeholder="새 비밀번호 (변경하지 않으면 비워두세요)" autocomplete="new-password">
        <label for="p-school" class="profile-field-label">학교</label>
        <select id="p-school">
            <option value="">학교 선택</option>
            <option value="군산기계공업고등학교">군산기계공업고등학교</option>
            <option value="수소에너지고등학교">수소에너지고등학교</option>
            <option value="이리공업고등학교">이리공업고등학교</option>
            <option value="전북기계공업고등학교">전북기계공업고등학교</option>
            <option value="전북자동차고등학교">전북자동차고등학교</option>
            <option value="전주공업고등학교">전주공업고등학교</option>
        </select>
        <label for="p-sid" class="profile-field-label">학번</label>
        <input type="text" id="p-sid" placeholder="학번 (5자리)" inputmode="numeric">
        <p class="sid-format-hint">예시) 2학년 7반 1번 -&gt; 20701</p>
        <button type="button" class="btn-blue" onclick="saveProfile()">저장</button>
        <button type="button" class="btn-gray" onclick="closeProfile()">취소</button>
    </div>

    <!-- 4. 과목 및 회차 선택 (연습: 과목 → 회차 순) -->
    <div id="subject-box" class="card hidden">
        <h2 id="subject-title">과목 선택</h2>
        <div id="subject-btns">
            <button class="btn-blue" onclick="onSubjectPick('drawing.json')">전산응용기계제도기능사</button>
            <button class="btn-blue" onclick="onSubjectPick('lathe.json')">컴퓨터응용선반기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('milling.json')">컴퓨터응용밀링기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('assembly.json')">기계조립기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('maintenance.json')">설비보전기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('automation.json')">자동화설비기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('3dprint.json')">3D프린터운용기능사</button>
            <button class="sub-btn" onclick="onSubjectPick('welding.json')">피복아크용접기능사</button>
        </div>
        <div id="session-select-div" class="hidden">
            <p id="session-subject-label" style="font-size:14px;color:#555;margin:0 0 10px 0;"></p>
            <select id="session-val" aria-label="회차 선택"><option value="25-01">2025년 1회차</option><option value="24-04">2024년 4회차</option></select>
            <button type="button" class="btn-green" onclick="startPracticeFromSelection()">이 회차로 시작</button>
            <button type="button" class="btn-gray" onclick="backToSubjectPick()">과목 다시 선택</button>
        </div>
        <button type="button" class="btn-gray" onclick="backToModeSelect()" style="margin-top:12px;">← 모드 선택으로</button>
    </div>

    <!-- 5. 퀴즈 화면 -->
    <div id="quiz-box" class="card hidden">
        <div id="timer-bar-ui" class="timer-bar"><div id="timer-fill"></div></div>
        <div id="game-header">
            <div id="life-display"></div>
            <div id="timer-text">00:00</div>
            <div id="score-display">점수: 0</div>
            <div id="progress-display"></div>
        </div>
        <h3 id="q-txt"></h3>
        <div id="q-img"></div>
        <div id="q-opts"></div>

        <div id="item-section" class="item-zone hidden">
            <div style="font-size:11px; margin-bottom:5px;">연속 정답: <span id="streak-count" style="color:blue;">0</span>/3 (최대 2개)</div>
            <div class="item-container">
                <button id="item-hint" class="item-btn" onclick="useItem('hint')">🔍 힌트 <span id="cnt-hint" class="item-count">0</span></button>
                <button id="item-shield" class="item-btn" onclick="useItem('shield')">🛡️ 실드 <span id="cnt-shield" class="item-count">0</span></button>
                <button id="item-time" class="item-btn" onclick="useItem('time')">⏳ 정지 <span id="cnt-time" class="item-count">0</span></button>
            </div>
        </div>

        <div id="explanation-box" style="display:none; background:#eee; padding:10px; margin-top:10px; text-align:left; font-size:14px;"></div>
        <button id="next-btn" class="btn-blue hidden" onclick="nextPracticeQuestion()">다음 문제</button>
        <button type="button" class="btn-gray" onclick="quitGame()" style="margin-top:14px;">그만하기</button>
    </div>

    <!-- 6. 랭킹 화면 -->
    <div id="rank-box" class="card hidden">
        <h2 id="res-title">실시간 랭킹</h2>
        <div class="rank-tabs">
            <div id="tab-practice" class="rank-tab" onclick="fetchRanking('practice')">연습왕</div>
            <div id="tab-classic" class="rank-tab" onclick="fetchRanking('classic')">클래식</div>
            <div id="tab-survival" class="rank-tab" onclick="fetchRanking('survival')">서바이벌</div>
            <div id="tab-timeattack" class="rank-tab" onclick="fetchRanking('timeattack')">타임어택</div>
        </div>
        <div id="rank-my-record" class="hidden" style="margin-bottom:14px;"></div>
        <div id="rank-list"></div>
        <div id="rank-admin-actions" class="rank-admin-actions hidden">
            <label><input type="checkbox" id="rank-admin-select-all" onchange="toggleRankSelectAll(this.checked)"> 전체 선택</label>
            <button type="button" class="btn-red" onclick="adminDeleteSelectedUsers()" style="width:100%;margin-top:10px;">선택한 회원 삭제</button>
        </div>
        <button class="btn-blue" onclick="location.reload()">메인으로</button>
    </div>

    <script>
        // Firebase 설정 (본인 설정값 입력)
        const firebaseConfig = {
            apiKey: "AIzaSyBw4aKlyf8JGEXLTpvIXBScr1XOFJ2eAzU",
            authDomain: "catchcertification-1d63d.firebaseapp.com",
            projectId: "catchcertification-1d63d",
            storageBucket: "catchcertification-1d63d.firebasestorage.app",
            messagingSenderId: "309107718029",
            appId: "1:309107718029:web:f6addcc6b46cc52e33efc4",
            measurementId: "G-W0P90QVS37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        /** 랭킹에서 회원 삭제 권한이 있는 관리자 아이디 (필요 시 추가) */
        const ADMIN_USER_IDS = ['admin'];

        let user=null, quizList=[], currentIdx=0, score=0, mode='';
        let currentRankMode = 'practice';
        let pendingQuizFile = null;
        const SUBJECT_LABELS = {
            'drawing.json': '전산응용기계제도기능사',
            'lathe.json': '컴퓨터응용선반기능사',
            'milling.json': '컴퓨터응용밀링기능사',
            'assembly.json': '기계조립기능사',
            'maintenance.json': '설비보전기능사',
            'automation.json': '자동화설비기능사',
            '3dprint.json': '3D프린터운용기능사',
            'welding.json': '피복아크용접기능사'
        };
        let lives=3, timeLeft=60, totalTime=0, timerInterval, isShieldActive=false, isTimeFrozen=false;
        let sessionPracticeSolved = 0;
        let items = { hint: 0, shield: 0, time: 0 }, streak = 0, isIdCheck = false, lastId = "";
        let isIdentityCheck = false, lastIdentityName = "", lastIdentityBirth = "";

        function isAdmin() {
            return user && ADMIN_USER_IDS.includes(String(user.id));
        }
        /** 대소문자 구분 없이 "admin"과 동일하거나, 아이디에 "admin"이 들어가면 가입 불가 */
        function isForbiddenSignupUserId(id) {
            if(!id) return false;
            return String(id).trim().toLowerCase().includes('admin');
        }

        // UI 제어
        function toggleView(r) { document.getElementById('login-box').classList.toggle('hidden', r); document.getElementById('reg-box').classList.toggle('hidden', !r); }
        function selectMode(m) {
            mode = m;
            pendingQuizFile = null;
            document.getElementById('mode-box').classList.add('hidden');
            document.getElementById('subject-box').classList.remove('hidden');
            document.getElementById('subject-btns').classList.remove('hidden');
            document.getElementById('session-select-div').classList.add('hidden');
            document.getElementById('subject-title').textContent = '과목 선택';
        }

        function onSubjectPick(file) {
            if (mode === 'practice') {
                pendingQuizFile = file;
                document.getElementById('subject-btns').classList.add('hidden');
                document.getElementById('session-select-div').classList.remove('hidden');
                document.getElementById('subject-title').textContent = '회차 선택';
                document.getElementById('session-subject-label').textContent =
                    '선택한 과목: ' + (SUBJECT_LABELS[file] || file);
            } else {
                prepareQuiz(file);
            }
        }
        function backToSubjectPick() {
            pendingQuizFile = null;
            document.getElementById('subject-btns').classList.remove('hidden');
            document.getElementById('session-select-div').classList.add('hidden');
            document.getElementById('subject-title').textContent = '과목 선택';
        }
        function startPracticeFromSelection() {
            if (!pendingQuizFile) return;
            prepareQuiz(pendingQuizFile);
        }
        function backToModeSelect() {
            pendingQuizFile = null;
            document.getElementById('subject-btns').classList.remove('hidden');
            document.getElementById('session-select-div').classList.add('hidden');
            document.getElementById('subject-title').textContent = '과목 선택';
            document.getElementById('subject-box').classList.add('hidden');
            document.getElementById('mode-box').classList.remove('hidden');
        }

        // 로그인
        function login() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            db.ref('users/' + id).once('value', s => {
                const d = s.val();
                if(d && String(d.pw) === String(pw)) {
                    user = { ...d, id: d.id || id };
                    const line = (user.name ? user.name + ' · ' : '') + user.id;
                    document.getElementById('mode-user-line').textContent = line;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('mode-box').classList.remove('hidden');
                }
                else alert("아이디 또는 비밀번호 오류");
            });
        }

        function openProfile() {
            document.getElementById('mode-box').classList.add('hidden');
            document.getElementById('profile-box').classList.remove('hidden');
            document.getElementById('p-id-display').textContent = user.id;
            document.getElementById('p-name').value = user.name || '';
            document.getElementById('p-pw').value = '';
            document.getElementById('p-school').value = user.school || '';
            document.getElementById('p-sid').value = user.student_id || '';
            syncProfileHideButton();
        }
        function syncProfileHideButton() {
            const btn = document.getElementById('p-name-hide-btn');
            if(!btn || !user) return;
            if(user.hide_name_in_ranking) {
                btn.textContent = '표시';
                btn.title = '랭킹에 이름 표시';
            } else {
                btn.textContent = '숨기기';
                btn.title = '랭킹에서 이름 숨기기';
            }
        }
        function toggleRankingNameHide() {
            if(!user) return;
            const next = !user.hide_name_in_ranking;
            if(next) alert("랭킹에서 이름이 보이지 않습니다.");
            else alert("랭킹에 이름이 다시 표시됩니다.");
            db.ref('users/' + user.id).update({ hide_name_in_ranking: next }).then(() => {
                user.hide_name_in_ranking = next;
                syncProfileHideButton();
            }).catch(() => alert("저장에 실패했습니다."));
        }
        function closeProfile() {
            document.getElementById('profile-box').classList.add('hidden');
            document.getElementById('mode-box').classList.remove('hidden');
        }
        function saveProfile() {
            if(!user) return;
            const newPw = document.getElementById('p-pw').value.trim();
            const school = document.getElementById('p-school').value;
            const sid = document.getElementById('p-sid').value.trim();
            if(!school) return alert("학교를 선택해주세요.");
            if(!/^[1-3][0-9]{2}(0[1-9]|1[0-9]|2[0-2])$/.test(sid)) return alert("학번: 5자리 (01~22)");
            const payload = { school, student_id: sid };
            if(newPw) payload.pw = newPw;
            db.ref('users/' + user.id).update(payload).then(() => {
                if(newPw) user.pw = newPw;
                user.school = school;
                user.student_id = sid;
                document.getElementById('p-pw').value = '';
                const line = (user.name ? user.name + ' · ' : '') + user.id;
                document.getElementById('mode-user-line').textContent = line;
                alert("저장되었습니다.");
                closeProfile();
            }).catch(() => alert("저장에 실패했습니다."));
        }

        // 회원가입
        function resetIdCheck() { isIdCheck = false; }
        function resetIdentityCheck() { isIdentityCheck = false; }
        function checkDuplicateIdentity() {
            const n = document.getElementById('r-name').value.trim();
            const b = document.getElementById('r-birth').value.trim();
            if(!/^[가-힣]{3,5}$/.test(n)) return alert("이름: 한글 3~5자를 입력한 뒤 확인하세요.");
            if(!/^\d{6}$/.test(b)) return alert("생년월일: 숫자 6자를 입력한 뒤 확인하세요.");
            db.ref('users').once('value').then(s => {
                let conflict = false;
                s.forEach(child => {
                    const u = child.val();
                    if(u && u.name === n && String(u.birth) === String(b)) conflict = true;
                });
                if(conflict) {
                    alert("이미 동일한 이름과 생년월일로 가입된 계정이 있습니다.");
                    isIdentityCheck = false;
                } else {
                    alert("사용 가능합니다.");
                    isIdentityCheck = true;
                    lastIdentityName = n;
                    lastIdentityBirth = b;
                }
            }).catch(() => {
                alert("확인 중 오류입니다. 네트워크와 Firebase 읽기 권한을 확인하세요.");
            });
        }
        function checkDuplicateId() {
            const id = document.getElementById('r-id').value.trim();
            if(!id) return alert("아이디를 입력하세요.");
            if(isForbiddenSignupUserId(id)) return alert('아이디에 "admin"이 들어갈 수 없습니다. (대소문자 구분 없음)');
            db.ref('users/'+id).once('value').then(s => {
                if(s.exists()) { alert("이미 사용 중인 아이디!"); isIdCheck = false; }
                else { alert("사용 가능!"); isIdCheck = true; lastId = id; }
            }).catch(err => {
                alert("아이디 확인 중 오류입니다. 네트워크와 Firebase 규칙(읽기 허용)을 확인하세요.");
            });
        }
        function register() {
            const id=document.getElementById('r-id').value.trim(), pw=document.getElementById('r-pw').value.trim();
            const school=document.getElementById('r-school').value;
            const n=document.getElementById('r-name').value.trim(), s=document.getElementById('r-sid').value.trim(), b=document.getElementById('r-birth').value.trim();

            if(isForbiddenSignupUserId(id)) return alert('아이디에 "admin"이 들어갈 수 없습니다. (대소문자 구분 없음)');
            if(!isIdCheck || id !== lastId) return alert("아이디 중복 확인을 해주세요.");
            if(!isIdentityCheck || n !== lastIdentityName || b !== lastIdentityBirth) return alert("이름·생년월일 중복 확인을 해주세요.");
            if(!school) return alert("학교를 선택해주세요.");
            if(!pw) return alert("비밀번호를 입력하세요.");
            if(!/^[가-힣]{3,5}$/.test(n)) return alert("이름: 한글 3~5자");
            if(!/^[1-3][0-9]{2}(0[1-9]|1[0-9]|2[0-2])$/.test(s)) return alert("학번: 5자리 (01~22)");
            if(!/^\d{6}$/.test(b)) return alert("생년월일: 숫자 6자");

            db.ref('users').once('value').then(snap => {
                let identityDup = false;
                snap.forEach(c => {
                    const u = c.val();
                    if(u && u.name === n && String(u.birth) === String(b) && c.key !== id) identityDup = true;
                });
                if(identityDup) {
                    alert("이미 동일한 이름과 생년월일로 가입된 계정이 있습니다.");
                    return Promise.reject(new Error('__identity_dup'));
                }
                return db.ref('users/'+id).set({
                    id, pw, school, name:n, student_id: s, birth:b,
                    hide_name_in_ranking: false,
                    practice_count:0, classic_score:0, survival_score:0, timeattack_score:0
                });
            }).then(() => {
                alert("가입 성공!");
                location.reload();
            }).catch(err => {
                if(err && err.message === '__identity_dup') return;
                const code = err && err.code ? String(err.code) : '';
                const msg = err && err.message ? err.message : '';
                if(code === 'PERMISSION_DENIED' || /permission/i.test(msg)) {
                    alert('가입에 실패했습니다.\nFirebase Realtime Database 규칙에서 익명 사용자의 users 쓰기(가입)가 허용되는지 확인하세요.');
                } else {
                    alert('가입에 실패했습니다.\n' + (msg || '네트워크 오류'));
                }
            });
        }

        // 퀴즈 준비 및 진행 (이전 답변과 로직 동일)
        function prepareQuiz(file) {
            fetch(file).then(r => r.json()).then(data => {
                quizList = (mode === 'practice') ? data.filter(p => p.session === document.getElementById('session-val').value) : data.sort(() => Math.random() - 0.5);
                startQuiz();
            }).catch(e => alert("파일 로드 실패"));
        }
        function startQuiz() {
            document.getElementById('subject-box').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            score=0; currentIdx=0; lives=3; timeLeft=60; streak=0; totalTime=0; items={hint:0,shield:0,time:0};
            sessionPracticeSolved = 0;
            document.getElementById('item-section').classList.toggle('hidden', mode !== 'timeattack');
            startTimer(); updateUI(); showQuestion();
        }
        function nextPracticeQuestion() {
            if(mode !== 'practice') return;
            currentIdx++;
            showQuestion();
        }
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isTimeFrozen) {
                    if(mode === 'timeattack') {
                        timeLeft -= 0.1;
                        document.getElementById('timer-fill').style.width = Math.max(0, (timeLeft / 60 * 100)) + "%";
                        document.getElementById('timer-text').innerText = Math.ceil(timeLeft) + "s";
                        if(timeLeft <= 0) endGame();
                    } else {
                        totalTime += 0.1;
                        const m = String(Math.floor(totalTime/60)).padStart(2,'0');
                        const s = String(Math.floor(totalTime%60)).padStart(2,'0');
                        document.getElementById('timer-text').innerText = `${m}:${s}`;
                    }
                }
            }, 100);
        }
        function updateUI() {
            document.getElementById('score-display').innerText = "점수: " + score;
            document.getElementById('life-display').innerText = (mode === 'survival') ? "❤️".repeat(lives) : "";
            document.getElementById('progress-display').innerText = (currentIdx + 1) + "/" + quizList.length;
            if(mode === 'timeattack') {
                document.getElementById('streak-count').innerText = streak;
                document.getElementById('cnt-hint').innerText = items.hint;
                document.getElementById('cnt-shield').innerText = items.shield;
                document.getElementById('cnt-time').innerText = items.time;
            }
        }
        function showQuestion() {
            if(currentIdx >= quizList.length) return endGame();
            const p = quizList[currentIdx];
            document.getElementById('q-txt').innerText = p.question;
            document.getElementById('q-img').innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";
            document.getElementById('explanation-box').style.display = "none";
            document.getElementById('next-btn').classList.add('hidden');
            const optDiv = document.getElementById('q-opts'); optDiv.innerHTML = "";
            p.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn"; btn.innerText = (i+1) + ". " + o;
                btn.onclick = () => checkAnswer(i + 1, btn);
                optDiv.appendChild(btn);
            });
        }
        function checkAnswer(ans, btn) {
            const p = quizList[currentIdx];
            if(ans === p.answer) {
                score += 10;
                if(mode === 'timeattack') {
                    timeLeft += 30;
                    if((items.hint + items.shield + items.time) < 2) { streak++; if(streak >= 3) { gainRandomItem(); streak = 0; } }
                }
                btn.classList.add('correct'); proceed();
            } else {
                streak = 0;
                if(isShieldActive) { isShieldActive = false; alert("🛡️ 실드 방어!"); btn.classList.add('correct'); proceed(); }
                else {
                    btn.classList.add('wrong');
                    if(mode === 'survival') { lives--; if(lives <= 0) return endGame(); }
                    if(mode === 'timeattack') timeLeft -= 10;
                    proceed();
                }
            }
            if(mode === 'practice') sessionPracticeSolved++;
            updateUI();
        }
        function gainRandomItem() {
            const p = ['hint', 'shield', 'time']; const picked = p[Math.floor(Math.random()*3)];
            items[picked]++; alert("🎁 아이템 획득: " + picked.toUpperCase());
        }
        function useItem(t) {
            if(items[t] <= 0) return; items[t]--; streak = 0;
            if(t==='hint') { const p = quizList[currentIdx]; const bs = document.getElementsByClassName('option-btn'); let r=0; for(let i=0; i<bs.length; i++){ if(i+1!==p.answer && r<2){ bs[i].style.visibility="hidden"; r++; } } }
            else if(t==='shield') isShieldActive = true;
            else if(t==='time') { isTimeFrozen = true; setTimeout(()=>isTimeFrozen=false, 5000); }
            updateUI();
        }
        function proceed() {
            if(mode === 'practice') {
                const p = quizList[currentIdx];
                const exp = document.getElementById('explanation-box');
                exp.innerHTML = `<b>정답: ${p.answer}번</b><br>${p.explanation || "해설 없음"}`;
                exp.style.display = "block"; document.getElementById('next-btn').classList.remove('hidden');
            } else setTimeout(() => { currentIdx++; showQuestion(); }, 400);
        }

        // 결과 및 랭킹
        async function refreshUserFromDb() {
            if(!user || !user.id) return;
            const s = await db.ref('users/' + user.id).once('value');
            if(s.exists()) user = { ...s.val(), id: user.id };
        }

        function updateMyRecordPanel(rankMode, rankInfo) {
            const el = document.getElementById('rank-my-record');
            if(!el) return;
            if(!user || !user.id) {
                el.classList.add('hidden');
                el.innerHTML = '';
                return;
            }
            el.classList.remove('hidden');
            let extra = '';
            if(rankInfo) {
                if(rankInfo.overallRank != null) {
                    extra = ` · 전체 <strong>${rankInfo.overallRank}</strong>등 (기록 있는 사용자 ${rankInfo.totalRanked}명 중)`;
                    if(rankInfo.inTop50 === false) {
                        extra += ` <span style="color:#666;font-size:12px;">· 아래 목록은 상위 50명</span>`;
                    }
                } else if(rankInfo.noRecord) {
                    extra = ` · <span style="color:#856404;">이 모드 기록 없음 — 순위 없음</span> (기록 있는 사용자 ${rankInfo.totalRanked}명)`;
                }
            }
            if(rankMode === 'practice') {
                const cnt = user.practice_count != null ? user.practice_count : 0;
                const t = user.practice_time || '--:--';
                el.innerHTML = `<div class="rank-my-box"><b>나의 기록</b> · 누적 <strong>${cnt}</strong>문제 · 시간 ${t}${extra}</div>`;
            } else {
                const sc = user[rankMode + '_score'] != null ? user[rankMode + '_score'] : 0;
                const tm = rankMode === 'classic' ? (user.classic_time || '--:--') : (user[rankMode + '_time'] || '--:--');
                el.innerHTML = `<div class="rank-my-box"><b>나의 기록</b> · <strong>${sc}</strong>점 · ${tm}${extra}</div>`;
            }
        }

        async function persistGameResultAndShowRanking() {
            clearInterval(timerInterval);
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('rank-box').classList.remove('hidden');
            const timeStr = document.getElementById('timer-text').innerText;
            const updates = {};
            if(mode === 'practice') {
                updates[`users/${user.id}/practice_count`] = (user.practice_count || 0) + sessionPracticeSolved;
                updates[`users/${user.id}/practice_time`] = timeStr;
            } else {
                updates[`users/${user.id}/${mode}_score`] = Math.max(user[mode+'_score'] || 0, score);
                if(mode === 'classic') updates[`users/${user.id}/classic_time`] = timeStr;
            }
            await db.ref().update(updates);
            await refreshUserFromDb();
            await fetchRanking(mode);
        }
        async function endGame() {
            await persistGameResultAndShowRanking();
        }
        function quitGame() {
            if(!confirm('그만두시겠습니까? 지금까지의 기록이 저장되고 랭킹으로 이동합니다.')) return;
            persistGameResultAndShowRanking().catch(() => alert('저장에 실패했습니다.'));
        }

        function escapeAttr(s) {
            return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        }

        function toggleRankSelectAll(checked) {
            document.querySelectorAll('#rank-list .rank-admin-cb').forEach(cb => { cb.checked = checked; });
        }

        async function adminDeleteSelectedUsers() {
            if(!isAdmin()) return;
            const cbs = [...document.querySelectorAll('#rank-list .rank-admin-cb:checked')];
            if(cbs.length === 0) return alert('삭제할 항목을 선택하세요.');
            const ids = cbs.map(cb => cb.getAttribute('data-uid')).filter(Boolean);
            if(ids.length === 0) return;
            if(!confirm(ids.length + '명의 회원 데이터를 삭제합니다. 되돌릴 수 없습니다. 계속하시겠습니까?')) return;
            const updates = {};
            ids.forEach(id => { updates['users/' + id] = null; });
            try {
                await db.ref().update(updates);
                if(user && ids.includes(String(user.id))) {
                    alert('계정이 삭제되어 로그아웃됩니다.');
                    location.reload();
                    return;
                }
                alert('삭제되었습니다.');
                await fetchRanking(currentRankMode);
            } catch(err) {
                alert('삭제에 실패했습니다. Firebase 규칙에서 관리자 쓰기를 허용했는지 확인하세요.');
            }
        }

        async function fetchRanking(rankMode) {
            currentRankMode = rankMode;
            document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+rankMode).classList.add('active-tab');
            const list = document.getElementById('rank-list');
            const adminBar = document.getElementById('rank-admin-actions');
            if(adminBar) adminBar.classList.add('hidden');
            list.innerHTML = "로딩 중...";
            if(user && user.id) {
                try { await refreshUserFromDb(); } catch(e) {}
            }
            const field = rankMode === 'practice' ? 'practice_count' : rankMode + '_score';
            try {
                const snap = await db.ref('users').once('value');
                const arr = [];
                snap.forEach(c => {
                    const v = c.val();
                    if(!v) return;
                    arr.push({ ...v, id: v.id != null ? v.id : c.key });
                });
                const arrWithRecord = arr.filter(u => (Number(u[field]) || 0) > 0);
                arrWithRecord.sort((a, b) => {
                    const va = Number(a[field]) || 0;
                    const vb = Number(b[field]) || 0;
                    return vb - va;
                });
                let rankInfo = null;
                if(user && user.id) {
                    const idx = arrWithRecord.findIndex(u => String(u.id) === String(user.id));
                    if(idx >= 0) {
                        rankInfo = {
                            overallRank: idx + 1,
                            totalRanked: arrWithRecord.length,
                            inTop50: idx < 50
                        };
                    } else {
                        rankInfo = { overallRank: null, totalRanked: arrWithRecord.length, noRecord: true };
                    }
                }
                updateMyRecordPanel(rankMode, rankInfo);
                const top = arrWithRecord.slice(0, 50);
                const showAdmin = isAdmin();
                list.innerHTML = top.map((u, i) => {
                    const hideName = u.hide_name_in_ranking === true;
                    const titleLine = hideName
                        ? `<b>${u.id || ''}</b>`
                        : `<b>${u.name || ''} <small style="color:#999;">(${u.id})</small></b>`;
                    const valStr = rankMode === 'practice'
                        ? ('누적 ' + (u.practice_count != null ? u.practice_count : 0) + '문제')
                        : ((u[field] != null ? u[field] : 0) + '점');
                    const timeStr = u[rankMode + '_time'] || u['classic_time'] || '--:--';
                    const uid = String(u.id || '');
                    const cb = showAdmin
                        ? `<label class="rank-admin-label"><input type="checkbox" class="rank-admin-cb" data-uid="${escapeAttr(uid)}" aria-label="${escapeAttr(uid)} 선택"></label>`
                        : '';
                    return `
                    <div class="rank-item ${i===0?'rank-1':''}${showAdmin ? ' rank-item--admin' : ''}">
                        ${cb}
                        <b style="width:25px;flex-shrink:0;">${i+1}</b>
                        <div class="rank-info">
                            ${titleLine}<br>
                            <div class="rank-school">${u.school || "학교 정보 없음"}</div>
                            <small style="color:#dc3545; font-weight:bold;">
                                ${valStr}
                                (${timeStr})
                            </small>
                        </div>
                    </div>
                `;
                }).join('');
                if(top.length === 0) list.innerHTML = '<p style="color:#666;">표시할 기록이 없습니다.</p>';
                if(adminBar) {
                    if(showAdmin && top.length > 0) {
                        adminBar.classList.remove('hidden');
                        const master = document.getElementById('rank-admin-select-all');
                        if(master) master.checked = false;
                    } else adminBar.classList.add('hidden');
                }
            } catch(e) {
                list.innerHTML = '<p style="color:#c00;">랭킹을 불러오지 못했습니다. 네트워크 또는 권한 설정을 확인해 주세요.</p>';
                if(adminBar) adminBar.classList.add('hidden');
                if(user && user.id) updateMyRecordPanel(rankMode, null);
            }
        }
        function openRank() { document.getElementById('login-box').classList.add('hidden'); document.getElementById('rank-box').classList.remove('hidden'); fetchRanking('practice'); }
        function openRankFromMode() {
            document.getElementById('mode-box').classList.add('hidden');
            document.getElementById('rank-box').classList.remove('hidden');
            fetchRanking('practice');
        }

        function escapeHtml(s) {
            if(s == null || s === undefined) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function loadLoginTop3Preview() {
            const el = document.getElementById('login-top3-preview');
            if(!el) return;
            el.innerHTML = '<p class="login-top3-loading">순위 불러오는 중...</p>';
            const modes = [
                { field: 'practice_count', label: '연습왕' },
                { field: 'classic_score', label: '클래식' },
                { field: 'survival_score', label: '서바이벌' },
                { field: 'timeattack_score', label: '타임어택' }
            ];
            try {
                const snap = await db.ref('users').once('value');
                const arr = [];
                snap.forEach(c => {
                    const v = c.val();
                    if(!v) return;
                    arr.push({ ...v, id: v.id != null ? v.id : c.key });
                });
                el.innerHTML = modes.map(m => {
                    const sorted = [...arr].sort((a, b) => (Number(b[m.field]) || 0) - (Number(a[m.field]) || 0));
                    const top = sorted.filter(u => (Number(u[m.field]) || 0) > 0).slice(0, 3);
                    const lines = top.length
                        ? top.map((u, i) =>
                            `<div class="login-top3-line"><span class="login-top3-rank">${i + 1}.</span> ${escapeHtml(u.id)} <span class="login-top3-muted">·</span> ${escapeHtml(u.school || '학교 없음')}</div>`
                          ).join('')
                        : '<div class="login-top3-empty">기록 없음</div>';
                    return `<div class="login-top3-block"><div class="login-top3-title">${m.label}</div>${lines}</div>`;
                }).join('');
            } catch(e) {
                el.innerHTML = '<p class="login-top3-err">순위를 불러오지 못했습니다.</p>';
            }
        }

        loadLoginTop3Preview();
    </script>
</body>
