<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATCH CERT - School & Game Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
/* 1. 모든 요소의 크기 계산을 테두리 포함으로 고정 */
        * { box-sizing: border-box; }

        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        
        /* 2. 카드의 패딩을 고정 (여백 관리의 기준) */
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }

        /* 3. 일반 입력창/선택창 설정: 너비 100% */
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; /* 위아래 간격 */
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 15px; 
            display: block;
        }

        /* 4. 중복확인 그룹: 너비를 정확히 100%로 고정 */
        .input-group { 
            display: flex; 
            width: 100%; /* 카드 너비에 꽉 차게 */
            gap: 8px;    /* 입력창과 버튼 사이 간격 */
            margin: 8px 0; 
            align-items: stretch; /* 높이를 동일하게 */
        }

        /* 5. 그룹 내부의 아이디 입력창: 마진을 0으로 만들어 그룹 너비에 맞춤 */
        .input-group input { 
            flex: 1;     /* 남은 공간 모두 차지 */
            margin: 0;   /* 중요: 바깥 여백 제거 */
        }

        /* 6. 중복확인 버튼 */
        .input-group button { 
            width: 100px; /* 버튼 가로폭 고정 */
            margin: 0;    /* 중요: 바깥 여백 제거 */
            padding: 0;
            background: #6c757d;
            font-size: 13px;
            color: white;
            border: none;
            border-radius: 8px;
            flex-shrink: 0; /* 버튼이 찌그러지지 않게 */
        }

        /* 7. 하단 가입완료 버튼 */
        .btn-blue { 
            width: 100%; 
            padding: 14px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            margin: 10px 0;
        }
        
        .btn-blue { background: #007bff; } .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; } .btn-orange { background: #fd7e14; }
        .btn-purple { background: #6f42c1; } .btn-gray { background: #6c757d; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 게임 UI */
        #game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
        .timer-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin-bottom: 10px; overflow: hidden; border: 1px solid #ddd; }
        #timer-fill { width: 100%; height: 100%; background: #28a745; transition: width 0.1s linear; }
        
        /* 아이템 UI */
        .item-zone { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed #ccc; }
        .item-container { display: flex; justify-content: space-around; gap: 5px; }
        .item-btn { 
            width: 32% !important; /* 아이템 버튼은 100%가 아니므로 !important 추가 */
            font-size: 11px; background: #6f42c1; padding: 10px 2px; position: relative; 
        }
        .item-btn:disabled { background: #ccc; filter: grayscale(1); cursor: not-allowed; }
        .item-count { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

        .option-btn { background: #f8f9fa; color: #333 !important; border: 1px solid #ddd; text-align: left; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        
        /* 랭킹 탭 */
        .rank-tabs { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .rank-tab { 
            width: auto !important; /* 탭 버튼도 100% 무시 */
            font-size: 11px; padding: 10px 2px; cursor: pointer; background: #eee; border-radius: 5px; flex: 1; margin: 0 2px; border: 1px solid #ddd; color: #333;
        }
        .active-tab { background: #007bff !important; color: white !important; border-color: #0056b3; }
        
        img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        .rank-item { display: flex; align-items: center; padding: 12px; margin: 8px 0; border-radius: 10px; background: #fff; border: 1px solid #eee; font-size: 14px; }
        .rank-1 { background: #fff9e6; border: 1px solid #ffd700; box-shadow: 0 2px 5px rgba(255,215,0,0.2); }
        .rank-school { font-size: 11px; color: #666; margin-top: 2px; }
        .rank-info { flex: 1; text-align: left; }
    </style>
</head>
<body>

    <!-- 1. 로그인 섹션 -->
    <div id="login-box" class="card">
        <h1 style="color:#007bff; margin-bottom:30px;">CATCH CERT</h1>
        <input type="text" id="l-id" placeholder="아이디"><br>
        <input type="password" id="l-pw" placeholder="비밀번호"><br>
        <button class="btn-blue" onclick="login()">로그인</button>
        <button class="btn-orange" onclick="openRank()">🏆 랭킹 보기</button>
        <p onclick="toggleView(true)" style="color:#007bff; cursor:pointer; margin-top:15px;">처음이신가요? 회원가입</p>
    </div>

    <!-- 2. 회원가입 섹션 -->
    <div id="reg-box" class="card hidden">
        <h2>회원가입</h2>
        <div style="display:flex; justify-content:center; gap:5px; width:95%; margin:auto;">
            <input type="text" id="r-id" placeholder="아이디" oninput="resetIdCheck()" style="width:65%;">
            <button onclick="checkDuplicateId()" style="width:25%; padding:10px; font-size:12px; background:#6c757d; color:white;">중복확인</button>
        </div>
        <input type="password" id="r-pw" placeholder="비밀번호">
        
        <!-- 학교 선택 추가 -->
        <select id="r-school">
            <option value="">학교 선택</option>
            <option value="군산기계공업고등학교">군산기계공업고등학교</option>
            <option value="수소에너지고등학교">수소에너지고등학교</option>
            <option value="이리공업고등학교">이리공업고등학교</option>
            <option value="전북기계공업고등학교">전북기계공업고등학교</option>
            <option value="전북자동차고등학교">전북자동차고등학교</option>
            <option value="전주공업고등학교">전주공업고등학교</option>
        </select>

        <input type="text" id="r-name" placeholder="이름 (한글 3~5자)">
        <input type="text" id="r-sid" placeholder="학번 (5자리)">
        <input type="text" id="r-birth" placeholder="생년월일 (숫자 6자리)">
        <button class="btn-blue" onclick="register()">가입완료</button>
        <p onclick="toggleView(false)" style="color:#007bff; cursor:pointer;">로그인으로 돌아가기</p>
    </div>

    <!-- 3. 모드 선택 -->
    <div id="mode-box" class="card hidden">
        <h2>모드 선택</h2>
        <button class="btn-green" onclick="selectMode('practice')">📖 연습하기 (공부량 랭킹)</button>
        <button class="btn-purple" onclick="selectMode('classic')">🏆 클래식 도전 (전체 풀이)</button>
        <button class="btn-red" onclick="selectMode('survival')">💔 서바이벌 (목숨 3개)</button>
        <button class="btn-orange" onclick="selectMode('timeattack')">⏱️ 타임 어택 (아이템전)</button>
    </div>

    <!-- 4. 과목 및 회차 선택 -->
    <div id="subject-box" class="card hidden">
        <h2 id="subject-title">과목 선택</h2>
        <div id="session-select-div" class="hidden">
            <select id="session-val"><option value="25-01">2025년 1회차</option><option value="24-04">2024년 4회차</option></select>
        </div>
        <button class="btn-blue" onclick="prepareQuiz('drawing.json')">전산응용기계제도기능사</button>
        <button class="btn-blue" onclick="prepareQuiz('lathe.json')">컴퓨터응용선반기능사</button>
    </div>

    <!-- 5. 퀴즈 화면 -->
    <div id="quiz-box" class="card hidden">
        <div id="timer-bar-ui" class="timer-bar"><div id="timer-fill"></div></div>
        <div id="game-header">
            <div id="life-display"></div>
            <div id="timer-text">00:00</div>
            <div id="score-display">점수: 0</div>
            <div id="progress-display"></div>
        </div>
        <h3 id="q-txt"></h3>
        <div id="q-img"></div>
        <div id="q-opts"></div>

        <div id="item-section" class="item-zone hidden">
            <div style="font-size:11px; margin-bottom:5px;">연속 정답: <span id="streak-count" style="color:blue;">0</span>/3 (최대 2개)</div>
            <div class="item-container">
                <button id="item-hint" class="item-btn" onclick="useItem('hint')">🔍 힌트 <span id="cnt-hint" class="item-count">0</span></button>
                <button id="item-shield" class="item-btn" onclick="useItem('shield')">🛡️ 실드 <span id="cnt-shield" class="item-count">0</span></button>
                <button id="item-time" class="item-btn" onclick="useItem('time')">⏳ 정지 <span id="cnt-time" class="item-count">0</span></button>
            </div>
        </div>

        <div id="explanation-box" style="display:none; background:#eee; padding:10px; margin-top:10px; text-align:left; font-size:14px;"></div>
        <button id="next-btn" class="btn-blue hidden" onclick="showQuestion()">다음 문제</button>
    </div>

    <!-- 6. 랭킹 화면 -->
    <div id="rank-box" class="card hidden">
        <h2 id="res-title">실시간 랭킹</h2>
        <div class="rank-tabs">
            <div id="tab-practice" class="rank-tab" onclick="fetchRanking('practice')">연습왕</div>
            <div id="tab-classic" class="rank-tab" onclick="fetchRanking('classic')">클래식</div>
            <div id="tab-survival" class="rank-tab" onclick="fetchRanking('survival')">서바이벌</div>
            <div id="tab-timeattack" class="rank-tab" onclick="fetchRanking('timeattack')">타임어택</div>
        </div>
        <div id="rank-list"></div>
        <button class="btn-blue" onclick="location.reload()">메인으로</button>
    </div>

    <script>
        // Firebase 설정 (본인 설정값 입력)
        const firebaseConfig = {
            apiKey: "AIzaSyBw4aKlyf8JGEXLTpvIXBScr1XOFJ2eAzU",
            authDomain: "catchcertification-1d63d.firebaseapp.com",
            projectId: "catchcertification-1d63d",
            storageBucket: "catchcertification-1d63d.firebasestorage.app",
            messagingSenderId: "309107718029",
            appId: "1:309107718029:web:f6addcc6b46cc52e33efc4",
            measurementId: "G-W0P90QVS37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user=null, quizList=[], currentIdx=0, score=0, mode='';
        let lives=3, timeLeft=60, totalTime=0, timerInterval, isShieldActive=false, isTimeFrozen=false;
        let items = { hint: 0, shield: 0, time: 0 }, streak = 0, isIdCheck = false, lastId = "";

        // UI 제어
        function toggleView(r) { document.getElementById('login-box').classList.toggle('hidden', r); document.getElementById('reg-box').classList.toggle('hidden', !r); }
        function selectMode(m) {
            mode = m;
            document.getElementById('mode-box').classList.add('hidden');
            document.getElementById('subject-box').classList.remove('hidden');
            document.getElementById('session-select-div').classList.toggle('hidden', m !== 'practice');
        }

        // 로그인
        function login() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            db.ref('users/' + id).once('value', s => {
                const d = s.val();
                if(d && String(d.pw) === String(pw)) { user = d; document.getElementById('login-box').classList.add('hidden'); document.getElementById('mode-box').classList.remove('hidden'); }
                else alert("아이디 또는 비밀번호 오류");
            });
        }

        // 회원가입
        function resetIdCheck() { isIdCheck = false; }
        function checkDuplicateId() {
            const id = document.getElementById('r-id').value.trim();
            if(!id) return alert("아이디를 입력하세요.");
            db.ref('users/'+id).once('value', s => {
                if(s.exists()) alert("이미 사용 중인 아이디!");
                else { alert("사용 가능!"); isIdCheck = true; lastId = id; }
            });
        }
        function register() {
            const id=document.getElementById('r-id').value.trim(), pw=document.getElementById('r-pw').value.trim();
            const school=document.getElementById('r-school').value;
            const n=document.getElementById('r-name').value.trim(), s=document.getElementById('r-sid').value.trim(), b=document.getElementById('r-birth').value.trim();
            
            if(!isIdCheck || id !== lastId) return alert("중복 확인을 해주세요.");
            if(!school) return alert("학교를 선택해주세요.");
            if(!/^[가-힣]{3,5}$/.test(n)) return alert("이름: 한글 3~5자");
            if(!/^[1-3][0-9]{2}(0[1-9]|1[0-9]|20)$/.test(s)) return alert("학번: 5자리 (01~20)");
            if(!/^\d{6}$/.test(b)) return alert("생년월일: 숫자 6자");

            db.ref('users/'+id).set({
                id, pw, school, name:n, student_id:s, birth:b,
                practice_count:0, classic_score:0, survival_score:0, timeattack_score:0
            }).then(() => { alert("가입 성공!"); location.reload(); });
        }

        // 퀴즈 준비 및 진행 (이전 답변과 로직 동일)
        function prepareQuiz(file) {
            fetch(file).then(r => r.json()).then(data => {
                quizList = (mode === 'practice') ? data.filter(p => p.session === document.getElementById('session-val').value) : data.sort(() => Math.random() - 0.5);
                startQuiz();
            }).catch(e => alert("파일 로드 실패"));
        }
        function startQuiz() {
            document.getElementById('subject-box').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            score=0; currentIdx=0; lives=3; timeLeft=60; streak=0; totalTime=0; items={hint:0,shield:0,time:0};
            document.getElementById('item-section').classList.toggle('hidden', mode !== 'timeattack');
            startTimer(); updateUI(); showQuestion();
        }
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isTimeFrozen) {
                    if(mode === 'timeattack') {
                        timeLeft -= 0.1;
                        document.getElementById('timer-fill').style.width = Math.max(0, (timeLeft / 60 * 100)) + "%";
                        document.getElementById('timer-text').innerText = Math.ceil(timeLeft) + "s";
                        if(timeLeft <= 0) endGame();
                    } else {
                        totalTime += 0.1;
                        const m = String(Math.floor(totalTime/60)).padStart(2,'0');
                        const s = String(Math.floor(totalTime%60)).padStart(2,'0');
                        document.getElementById('timer-text').innerText = `${m}:${s}`;
                    }
                }
            }, 100);
        }
        function updateUI() {
            document.getElementById('score-display').innerText = "점수: " + score;
            document.getElementById('life-display').innerText = (mode === 'survival') ? "❤️".repeat(lives) : "";
            document.getElementById('progress-display').innerText = (currentIdx + 1) + "/" + quizList.length;
            if(mode === 'timeattack') {
                document.getElementById('streak-count').innerText = streak;
                document.getElementById('cnt-hint').innerText = items.hint;
                document.getElementById('cnt-shield').innerText = items.shield;
                document.getElementById('cnt-time').innerText = items.time;
            }
        }
        function showQuestion() {
            if(currentIdx >= quizList.length) return endGame();
            const p = quizList[currentIdx];
            document.getElementById('q-txt').innerText = p.question;
            document.getElementById('q-img').innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";
            document.getElementById('explanation-box').style.display = "none";
            document.getElementById('next-btn').classList.add('hidden');
            const optDiv = document.getElementById('q-opts'); optDiv.innerHTML = "";
            p.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn"; btn.innerText = (i+1) + ". " + o;
                btn.onclick = () => checkAnswer(i + 1, btn);
                optDiv.appendChild(btn);
            });
        }
        function checkAnswer(ans, btn) {
            const p = quizList[currentIdx];
            if(ans === p.answer) {
                score += 10;
                if(mode === 'timeattack') {
                    timeLeft += 30;
                    if((items.hint + items.shield + items.time) < 2) { streak++; if(streak >= 3) { gainRandomItem(); streak = 0; } }
                }
                btn.classList.add('correct'); proceed();
            } else {
                streak = 0;
                if(isShieldActive) { isShieldActive = false; alert("🛡️ 실드 방어!"); btn.classList.add('correct'); proceed(); }
                else {
                    btn.classList.add('wrong');
                    if(mode === 'survival') { lives--; if(lives <= 0) return endGame(); }
                    if(mode === 'timeattack') timeLeft -= 10;
                    proceed();
                }
            }
            updateUI();
        }
        function gainRandomItem() {
            const p = ['hint', 'shield', 'time']; const picked = p[Math.floor(Math.random()*3)];
            items[picked]++; alert("🎁 아이템 획득: " + picked.toUpperCase());
        }
        function useItem(t) {
            if(items[t] <= 0) return; items[t]--; streak = 0;
            if(t==='hint') { const p = quizList[currentIdx]; const bs = document.getElementsByClassName('option-btn'); let r=0; for(let i=0; i<bs.length; i++){ if(i+1!==p.answer && r<2){ bs[i].style.visibility="hidden"; r++; } } }
            else if(t==='shield') isShieldActive = true;
            else if(t==='time') { isTimeFrozen = true; setTimeout(()=>isTimeFrozen=false, 5000); }
            updateUI();
        }
        function proceed() {
            if(mode === 'practice') {
                const p = quizList[currentIdx];
                const exp = document.getElementById('explanation-box');
                exp.innerHTML = `<b>정답: ${p.answer}번</b><br>${p.explanation || "해설 없음"}`;
                exp.style.display = "block"; document.getElementById('next-btn').classList.remove('hidden');
            } else setTimeout(() => { currentIdx++; showQuestion(); }, 400);
        }

        // 결과 및 랭킹
        async function endGame() {
            clearInterval(timerInterval);
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('rank-box').classList.remove('hidden');
            const timeStr = document.getElementById('timer-text').innerText;
            const updates = {};
            if(mode === 'practice') {
                updates[`users/${user.id}/practice_count`] = (user.practice_count || 0) + (currentIdx + 1);
                updates[`users/${user.id}/practice_time`] = timeStr;
            } else {
                updates[`users/${user.id}/${mode}_score`] = Math.max(user[mode+'_score'] || 0, score);
                if(mode === 'classic') updates[`users/${user.id}/classic_time`] = timeStr;
            }
            await db.ref().update(updates);
            fetchRanking(mode);
        }

        function fetchRanking(rankMode) {
            document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+rankMode).classList.add('active-tab');
            const list = document.getElementById('rank-list');
            list.innerHTML = "로딩 중...";
            const field = rankMode === 'practice' ? 'practice_count' : rankMode + '_score';
            db.ref('users').orderByChild(field).limitToLast(10).once('value', s => {
                const arr = []; s.forEach(c => arr.push(c.val())); arr.reverse();
                list.innerHTML = arr.map((u, i) => `
                    <div class="rank-item ${i==0?'rank-1':''}">
                        <b style="width:25px;">${i+1}</b>
                        <div class="rank-info">
                            <b>${u.name} <small style="color:#999;">(${u.id})</small></b><br>
                            <div class="rank-school">${u.school || "학교 정보 없음"}</div>
                            <small style="color:#dc3545; font-weight:bold;">
                                ${rankMode==='practice'?'누적 '+u.practice_count+'문제':u[field]+'점'} 
                                (${u[rankMode+'_time'] || u['classic_time'] || '--:--'})
                            </small>
                        </div>
                    </div>
                `).join('');
            });
        }
        function openRank() { document.getElementById('login-box').classList.add('hidden'); document.getElementById('rank-box').classList.remove('hidden'); fetchRanking('practice'); }
    </script>
</body>
</html>
