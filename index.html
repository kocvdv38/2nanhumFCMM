<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATCH CERTIFICATION - Smart Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* 기존 디자인 유지 + 정답/오답 효과 */
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 8px 0; font-size: 16px; transition: 0.2s; }
        .mode-btn { background: #28a745; }
        .challenge-btn { background: #dc3545; }
        .rank-view-btn { background: #ffc107; color: #212529; }
        .sub-btn { background: #6c757d; font-size: 14px; margin: 4px 0; }
        .option-btn { background: #f8f9fa; color: #333; border: 1px solid #ddd; text-align: left; margin: 8px 0; }
        
        /* 연습모드 정답/오답 강조 */
        .correct { background: #d4edda !important; border: 2px solid #28a745 !important; font-weight: bold; }
        .wrong { background: #f8d7da !important; border: 2px solid #dc3545 !important; }
        #explanation-box { background: #e9ecef; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; font-size: 14px; display: none; line-height: 1.5; }
        
        .rank-item { display: flex; align-items: center; padding: 12px; margin: 8px 0; border-radius: 10px; background: #fff; border: 1px solid #eee; }
        .rank-1 { background: linear-gradient(45deg, #fff9e6, #ffdf80); border: 2px solid #ffd700; }
        img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- 1. 로그인/회원가입 (기존과 동일) -->
    <div id="login-box" class="card">
        <h1 style="color:#007bff;">CATCH CERT</h1>
        <input type="text" id="l-id" placeholder="아이디"><br>
        <input type="password" id="l-pw" placeholder="비밀번호"><br>
        <button onclick="login()">로그인</button>
        <button class="rank-view-btn" onclick="showRankOnly()">🏆 명예의 전당</button>
        <p onclick="toggleView(true)" style="color:#007bff; cursor:pointer;">회원가입</p>
    </div>

    <div id="reg-box" class="card hidden">
        <h2>회원가입</h2>
        <div style="display:flex; justify-content:center; gap:5px; width:95%; margin:auto;">
            <input type="text" id="r-id" placeholder="아이디" oninput="resetIdCheck()" style="width:65%;">
            <button onclick="checkDuplicateId()" style="width:25%; padding:10px; font-size:12px; background:#6c757d;">중복확인</button>
        </div>
        <input type="password" id="r-pw" placeholder="비밀번호">
        <input type="text" id="r-name" placeholder="이름 (한글 3~5자)">
        <input type="text" id="r-sid" placeholder="학번 (5자리)">
        <input type="text" id="r-birth" placeholder="생년월일 (6자리)">
        <button onclick="register()">가입완료</button>
        <p onclick="toggleView(false)" style="color:#007bff; cursor:pointer;">로그인으로 돌아가기</p>
    </div>

    <!-- 2. 모드 선택 -->
    <div id="mode-box" class="card hidden">
        <h2>모드 선택</h2>
        <button class="mode-btn" onclick="goSubjectSelect(false)">📖 연습하기</button>
        <button class="challenge-btn" onclick="goSubjectSelect(true)">🔥 랭킹도전</button>
    </div>

    <!-- 3. 과목 및 회차 선택 -->
    <div id="subject-box" class="card hidden">
        <h2 id="sel-title">과목 선택</h2>
        <div id="session-select-div" class="hidden">
            <p style="font-size:14px; color:gray;">회차 선택 (연습모드 전용)</p>
            <select id="session-val">
                <option value="25-01">2025년 1회차</option>
                <option value="24-04">2024년 4회차</option>
                <option value="24-03">2024년 3회차</option>
                <option value="24-02">2024년 2회차</option>
                <option value="24-01">2024년 1회차</option>
            </select>
        </div>
        <div id="subject-list">
            <button class="sub-btn" onclick="prepareQuiz('drawing.json')">전산응용기계제도기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('lathe.json')">컴퓨터응용선반기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('milling.json')">컴퓨터응용밀링기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('assembly.json')">기계조립기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('maintenance.json')">설비보전기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('automation.json')">자동화설비기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('3dprint.json')">3D프린터운용기능사</button>
            <button class="sub-btn" onclick="prepareQuiz('welding.json')">피복아크용접기능사</button>
        </div>
    </div>

    <!-- 4. 퀴즈 화면 -->
    <div id="quiz-box" class="card hidden">
        <div style="display:flex; justify-content: space-between; font-size:14px; color:gray; margin-bottom:10px;">
            <span id="quiz-mode-tag"></span>
            <span id="timer-display">00:00</span>
        </div>
        <h3 id="q-txt"></h3>
        <div id="q-img"></div>
        <div id="q-opts"></div>
        <div id="explanation-box"></div>
        <button id="check-btn" class="hidden" style="background:#6c757d;" onclick="checkPracticeAnswer()">정답 확인</button>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">다음 문제</button>
        <p style="font-size:14px; color:#999; margin-top:15px;">진행: <span id="q-progress">0/0</span> | 점수: <span id="cur-score">0</span></p>
    </div>

    <!-- 5. 결과/랭킹 -->
    <div id="rank-box" class="card hidden">
        <h2 id="res-title">결과</h2>
        <div id="rank-list"></div>
        <button onclick="location.reload()">처음으로</button>
    </div>

    <script>
        // Firebase 설정 (사용자님 정보 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyBw4aKlyf8JGEXLTpvIXBScr1XOFJ2eAzU",
            authDomain: "catchcertification-1d63d.firebaseapp.com",
            projectId: "catchcertification-1d63d",
            storageBucket: "catchcertification-1d63d.firebasestorage.app",
            messagingSenderId: "309107718029",
            appId: "1:309107718029:web:f6addcc6b46cc52e33efc4",
            measurementId: "G-W0P90QVS37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user=null, allProblems=[], quizList=[], currentIdx=0, score=0, isRankingMode=false;
        let startTime, timerInterval, selectedAns=null;
        let isIdChecked = false, lastId = "";

        // UI 토글
        function toggleView(isReg) {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        }

        // 로그인
        async function login() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            db.ref('users/' + id).once('value', (s) => {
                const d = s.val();
                if(d && String(d.pw) === String(pw)) {
                    user = d;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('mode-box').classList.remove('hidden');
                } else { alert("아이디 또는 비밀번호가 틀립니다."); }
            });
        }

        // 모드 선택
        function goSubjectSelect(rankMode) {
            isRankingMode = rankMode;
            document.getElementById('mode-box').classList.add('hidden');
            document.getElementById('subject-box').classList.remove('hidden');
            document.getElementById('sel-title').innerText = rankMode ? "과목 선택 (전체 랜덤 랭킹)" : "과목 선택 (회차별 연습)";
            document.getElementById('session-select-div').classList.toggle('hidden', rankMode);
        }

        // 퀴즈 준비 (필터링 및 셔플)
        function prepareQuiz(fileName) {
            fetch(fileName).then(r => r.json()).then(data => {
                allProblems = data;
                
                if (isRankingMode) {
                    // 랭킹 모드: 전체 문제를 랜덤으로 섞음
                    quizList = [...allProblems];
                    shuffleArray(quizList);
                } else {
                    // 연습 모드: 선택한 회차만 필터링
                    const session = document.getElementById('session-val').value;
                    quizList = allProblems.filter(p => p.session === session);
                }

                if (quizList.length === 0) return alert("해당 조건의 문제가 없습니다.");

                startQuiz();
            }).catch(e => alert("문제 파일을 찾을 수 없습니다."));
        }

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            currentIdx = 0; score = 0;
            document.getElementById('subject-box').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            document.getElementById('quiz-mode-tag').innerText = isRankingMode ? "🔥 랭킹 (전체 랜덤)" : "📖 연습 (회차별)";
            
            startTime = Date.now();
            if(isRankingMode) startTimer();
            showQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const m = String(Math.floor(diff / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showQuestion() {
            selectedAns = null;
            const p = quizList[currentIdx];
            document.getElementById('q-progress').innerText = `${currentIdx + 1}/${quizList.length}`;
            document.getElementById('q-txt').innerText = p.question;
            document.getElementById('q-img').innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";
            document.getElementById('explanation-box').style.display = "none";
            document.getElementById('next-btn').classList.add('hidden');
            
            const optDiv = document.getElementById('q-opts');
            optDiv.innerHTML = "";
            p.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = `${i+1}) ${o}`;
                btn.onclick = () => selectOption(i + 1, btn);
                optDiv.appendChild(btn);
            });

            if (!isRankingMode) document.getElementById('check-btn').classList.remove('hidden');
            else document.getElementById('check-btn').classList.add('hidden');
        }

        function selectOption(idx, btn) {
            // 이미 정답 확인한 경우 클릭 방지
            if (!isRankingMode && !document.getElementById('next-btn').classList.contains('hidden')) return;

            selectedAns = idx;
            Array.from(document.getElementsByClassName('option-btn')).forEach(b => b.style.border = "1px solid #ddd");
            btn.style.border = "2px solid #007bff";

            if (isRankingMode) {
                if (selectedAns === quizList[currentIdx].answer) score += 10;
                document.getElementById('cur-score').innerText = score;
                setTimeout(nextQuestion, 200); // 랭킹 모드는 바로 다음
            }
        }

        function checkPracticeAnswer() {
            if (!selectedAns) return alert("답을 선택해주세요.");
            const p = quizList[currentIdx];
            const btns = document.getElementsByClassName('option-btn');
            
            btns[p.answer - 1].classList.add('correct');
            if (selectedAns !== p.answer) btns[selectedAns - 1].classList.add('wrong');
            else {
                score += 10;
                document.getElementById('cur-score').innerText = score;
            }

            document.getElementById('explanation-box').innerText = `정답: ${p.answer}번\n\n해설: ${p.explanation || "해설이 없습니다."}`;
            document.getElementById('explanation-box').style.display = "block";
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizList.length) showQuestion();
            else finishQuiz();
        }

        async function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-box').classList.add('hidden');
            document.getElementById('rank-box').classList.remove('hidden');

            const timeTaken = document.getElementById('timer-display').innerText;

            if (isRankingMode) {
                document.getElementById('res-title').innerText = `랭킹 등록 (기록: ${timeTaken})`;
                if (score > (user.score || 0)) {
                    await db.ref('users/' + user.id).update({ score, last_time: timeTaken });
                }
                fetchRanking();
            } else {
                document.getElementById('res-title').innerText = "연습 완료";
                document.getElementById('rank-list').innerHTML = `<h3>최종 점수: ${score}점</h3><p>수고하셨습니다!</p>`;
            }
        }

        function fetchRanking() {
            const list = document.getElementById('rank-list');
            list.innerHTML = "랭킹 로딩 중...";
            db.ref('users').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
                const users = [];
                snapshot.forEach((child) => { users.push(child.val()); });
                users.reverse();
                list.innerHTML = users.map((u, i) => `
                    <div class="rank-item ${i<3?'rank-'+(i+1):''}">
                        <div class="medal">${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div>
                        <div style="flex:1; text-align:left;">
                            <b>${u.name}</b><br>
                            <small>${u.score}점 (${u.last_time || '--:--'})</small>
                        </div>
                    </div>
                `).join('');
            });
        }

        // 회원가입 함수 생략 (기존과 동일)
        function resetIdCheck(){ isIdChecked = false; }
        function checkDuplicateId(){
            const id = document.getElementById('r-id').value.trim();
            db.ref('users/'+id).once('value', s => {
                if(s.exists()){ alert("아이디 중복!"); } else { alert("사용 가능!"); isIdChecked=true; lastId=id; }
            });
        }
        function register(){
            const id=document.getElementById('r-id').value.trim(), pw=document.getElementById('r-pw').value.trim();
            const n=document.getElementById('r-name').value.trim(), s=document.getElementById('r-sid').value.trim(), b=document.getElementById('r-birth').value.trim();
            if(!isIdChecked || id!==lastId) return alert("중복확인 필수");
            if(!/^[가-힣]{3,5}$/.test(n) || !/^[1-3][0-9]{2}(0[1-9]|1[0-9]|20)$/.test(s) || !/^\d{6}$/.test(b)) return alert("입력 형식 오류!");
            db.ref('users/'+id).set({id,pw,name:n,student_id:s,birth:b,score:0}).then(()=>{alert("가입성공!"); location.reload();});
        }
        function showRankOnly(){ document.getElementById('login-box').classList.add('hidden'); document.getElementById('rank-box').classList.remove('hidden'); fetchRanking(); }
    </script>
</body>
</html>
