<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기능사 자격증 고속 퀴즈</title>
    <!-- Firebase 라이브러리 추가 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* (기존 CSS와 동일) */
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 90%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px 0; }
        button:hover { background: #0056b3; }
        .sub-btn { background: #6c757d; }
        .option-btn { background: #f8f9fa; color: #333; border: 1px solid #ddd; text-align: left; }
        img { max-width: 100%; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<!-- (1~5 로그인, 회원가입, 과목선택, 퀴즈, 랭킹 섹션은 기존 HTML과 동일하게 유지) -->
<!-- 화면 구조는 이전 답변과 똑같이 만드시면 됩니다. 아래 자바스크립트가 핵심입니다. -->

<script>
    // 1. Firebase 설정 (본인의 정보로 교체하세요)
const firebaseConfig = {
  apiKey: "AIzaSyBw4aKlyf8JGEXlTpvIXBsCr1XOFJ2eAzU",
  authDomain: "catchcertification-1d63d.firebaseapp.com",
  projectId: "catchcertification-1d63d",
  storageBucket: "catchcertification-1d63d.firebasestorage.app",
  messagingSenderId: "309107718029",
  appId: "1:309107718029:web:f6addcc6b46cc52e33efc4",
  measurementId: "G-W0P90QVS37"
};

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let problems = [], currentIdx = 0, score = 0, user = null, selectedSubject = "";

    // 2. 로그인 (빛의 속도로 작동)
    async function login() {
        const id = document.getElementById('l-id').value.trim();
        const pw = document.getElementById('l-pw').value.trim();
        const btn = document.getElementById('login-btn');
        btn.innerText = "로그인 중...";

        db.ref('users/' + id).once('value', (snapshot) => {
            const userData = snapshot.val();
            if (userData && userData.pw === pw) {
                user = userData;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('subject-box').classList.remove('hidden');
            } else {
                alert("아이디 또는 비밀번호가 틀립니다.");
            }
            btn.innerText = "로그인";
        });
    }

    // 3. 회원가입
    async function register() {
        const id = document.getElementById('r-id').value.trim();
        const pw = document.getElementById('r-pw').value.trim();
        const name = document.getElementById('r-name').value;
        const sid = document.getElementById('r-sid').value;
        const birth = document.getElementById('r-birth').value;

        if(!id || !pw) return alert("필수 정보를 입력하세요.");

        db.ref('users/' + id).set({
            id: id, pw: pw, name: name, student_id: sid, birth: birth, score: 0
        }).then(() => {
            alert("가입 완료!");
            location.reload();
        });
    }

    // (loadSubject, showQuiz 등 퀴즈 진행 함수는 기존과 동일하게 유지)
    function loadSubject(fileName, subjectName) {
        selectedSubject = subjectName;
        fetch(fileName).then(r => r.json()).then(data => {
            problems = data; currentIdx = 0; score = 0;
            document.getElementById('subject-box').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            showQuiz();
        });
    }

    function showQuiz() {
        if (currentIdx >= problems.length) return finish();
        const p = problems[currentIdx];
        document.getElementById('q-txt').innerText = p.question;
        document.getElementById('q-img').innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";
        const optDiv = document.getElementById('q-opts'); optDiv.innerHTML = "";
        p.options.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = "option-btn"; btn.innerText = (i + 1) + ". " + o;
            btn.onclick = () => {
                if (i + 1 === p.answer) score += 10;
                document.getElementById('cur-score').innerText = score;
                currentIdx++; showQuiz();
            };
            optDiv.appendChild(btn);
        });
    }

    // 4. 점수 저장 및 실시간 랭킹 (거의 즉시 반영)
    async function finish() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('rank-box').classList.remove('hidden');
        
        // 기존 최고 점수보다 높을 때만 업데이트
        if (score > (user.score || 0)) {
            db.ref('users/' + user.id).update({ score: score });
        }

        // 전체 랭킹 불러오기 (점수순 정렬)
        db.ref('users').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
            const users = [];
            snapshot.forEach((child) => { users.push(child.val()); });
            users.reverse(); // 내림차순 정렬

            const list = document.getElementById('rank-list');
            list.innerHTML = users.map((u, i) => `<p>${i+1}위: ${u.name} - ${u.score}점</p>`).join('');
        });
    }
</script>
</body>
</html>
