<!DOCTYPE html>
<html>
<head>
    <title>퀴즈 랭킹 프로그램</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .hidden { display: none; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { margin: 5px; padding: 10px; width: 80%; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        img { max-width: 100%; height: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <h2>로그인</h2>
        <input id="login-id" placeholder="아이디"><br>
        <input id="login-pw" type="password" placeholder="비밀번호"><br>
        <button onclick="login()">로그인</button>
        <button onclick="showRegister()" style="background:#6c757d">회원가입 가기</button>
    </div>

    <div id="register-section" class="card hidden">
        <h2>회원가입</h2>
        <input id="reg-id" placeholder="아이디"><br>
        <input id="reg-pw" type="password" placeholder="비밀번호"><br>
        <input id="reg-sid" placeholder="학번"><br>
        <input id="reg-name" placeholder="이름"><br>
        <input id="reg-birth" placeholder="생년월일(6자리)"><br>
        <button onclick="register()">가입하기</button>
    </div>

    <div id="quiz-section" class="card hidden">
        <h3 id="q-text"></h3>
        <p id="q-view" style="color:gray"></p>
        <div id="q-image"></div>
        <div id="options"></div>
        <p>현재 점수: <span id="current-score">0</span></p>
    </div>

    <div id="rank-section" class="card hidden">
        <h2>실시간 랭킹</h2>
        <div id="rank-list"></div>
        <button onclick="location.reload()">다시 하기</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIofpGIAzl-ik8xSB1RwS3Ol1fisSy-0bapcEugoCEm215lVx4gqt8Z5xcu-ifq0Cv/exec";
        let currentUser = null;
        let score = 0;
        let problems = [];
        let currentIdx = 0;

        // 문제 불러오기 (GitHub의 problems.json 사용)
        fetch('problems.json').then(res => res.json()).then(data => problems = data);

        function showRegister() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        }

        async function register() {
            const data = {
                action: 'register',
                id: document.getElementById('reg-id').value,
                pw: document.getElementById('reg-pw').value,
                student_id: document.getElementById('reg-sid').value,
                name: document.getElementById('reg-name').value,
                birth: document.getElementById('reg-birth').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("가입 완료! 로그인해주세요.");
            location.reload();
        }

async function login() {
    const idInput = document.getElementById('login-id').value.trim();
    const pwInput = document.getElementById('login-pw').value.trim();
    
    try {
        // 구글 시트 데이터 가져오기
        const res = await fetch(SCRIPT_URL);
        const users = await res.json();
        
        console.log("불러온 사용자 목록:", users); // 브라우저 개발자 도구(F12)에서 확인 가능

        // 아이디와 비밀번호 대조
        const user = users.find(u => u.id === idInput && u.pw === pwInput);
        
        if (user) {
            currentUser = user;
            alert(user.name + "님, 환영합니다!");
            startQuiz();
        } else {
            alert("아이디 또는 비밀번호가 틀립니다.\n입력값: " + idInput + " / " + pwInput);
        }
    } catch (e) {
        console.error(e);
        alert("데이터를 불러오는 데 실패했습니다. 스크립트 URL과 배포 설정을 확인하세요.");
    }
}

        function startQuiz() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showProblem();
        }

        function showProblem() {
            if (currentIdx >= problems.length) {
                finishQuiz();
                return;
            }
            const p = problems[currentIdx];
            document.getElementById('q-text').innerText = p.question;
            document.getElementById('q-view').innerText = p.view || "";
            
            const imgDiv = document.getElementById('q-image');
            imgDiv.innerHTML = p.image_file ? `<img src="images/${p.image_file}">` : "";

            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            p.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = `${i+1}. ${opt}`;
                btn.style.display = "block";
                btn.style.width = "100%";
                btn.style.margin = "5px 0";
                btn.onclick = () => checkAnswer(i + 1);
                optDiv.appendChild(btn);
            });
        }

        function checkAnswer(ans) {
            if (ans === problems[currentIdx].answer) {
                score += 10;
                document.getElementById('current-score').innerText = score;
            }
            currentIdx++;
            showProblem();
        }

        async function finishQuiz() {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('rank-section').classList.remove('hidden');
            
            // 점수 업데이트
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateScore', id: currentUser.id, score: score }) });
            
            // 랭킹 표시
            const res = await fetch(SCRIPT_URL);
            const users = await res.json();
            users.sort((a, b) => b.score - a.score);
            
            const list = document.getElementById('rank-list');
            list.innerHTML = users.map((u, i) => `<p>${i+1}위: ${u.name} - ${u.score}점</p>`).join('');
        }
    </script>
</body>
</html>
